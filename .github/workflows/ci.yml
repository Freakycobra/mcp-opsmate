name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run ruff check
        run: ruff check opsmate/ tests/

      - name: Run ruff format check
        run: ruff format --check opsmate/ tests/

      - name: Run mypy type check
        run: mypy opsmate/ --ignore-missing-imports

  # ─────────────────────────────────────────────
  # Test Backend
  # ─────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opsmate
          POSTGRES_PASSWORD: opsmate
          POSTGRES_DB: opsmate_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U opsmate; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Wait for Redis
        run: |
          until redis-cli -h localhost -p 6379 ping | grep -q PONG; do
            echo "Waiting for Redis..."
            sleep 1
          done

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://opsmate:opsmate@localhost:5432/opsmate_test
        run: |
          alembic upgrade head

      - name: Run backend tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://opsmate:opsmate@localhost:5432/opsmate_test
          REDIS_URL: redis://localhost:6379/1
          EXECUTION_MODE: mock
          API_KEY: test-api-key
          ADMIN_API_TOKEN: test-admin-token
          OPENAI_API_KEY: test-openai-key-not-used
        run: |
          pytest tests/test_api/ tests/test_services/ tests/test_infra/ \
            --cov=opsmate \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # Test CLI
  # ─────────────────────────────────────────────
  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opsmate
          POSTGRES_PASSWORD: opsmate
          POSTGRES_DB: opsmate_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e opsmate/cli/

      - name: Wait for services
        run: |
          until pg_isready -h localhost -p 5432 -U opsmate; do sleep 1; done
          until redis-cli -h localhost -p 6379 ping | grep -q PONG; do sleep 1; done

      - name: Run CLI tests
        env:
          DATABASE_URL: postgresql+asyncpg://opsmate:opsmate@localhost:5432/opsmate_test
          REDIS_URL: redis://localhost:6379/1
          EXECUTION_MODE: mock
          API_KEY: test-api-key
          ADMIN_API_TOKEN: test-admin-token
        run: |
          pytest tests/test_cli/ -v --ignore=tests/test_cli/test_integration.py

  # ─────────────────────────────────────────────
  # Build Docker Images
  # ─────────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-backend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          load: true
          tags: mcp-opsmate-api:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./opsmate-web
          file: ./Dockerfile.web
          push: false
          load: true
          tags: mcp-opsmate-web:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Verify API image starts
        run: |
          docker run -d --name opsmate-api-test \
            -p 8000:8000 \
            -e EXECUTION_MODE=mock \
            -e DATABASE_URL=sqlite+aiosqlite:///tmp/test.db \
            -e API_KEY=test-key \
            mcp-opsmate-api:test

          # Wait for API to be ready
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ API is healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ API failed to start"
              docker logs opsmate-api-test
              exit 1
            fi
            sleep 1
          done

          # Verify health response structure
          HEALTH=$(curl -s http://localhost:8000/health)
          echo "Health response: $HEALTH"

          if ! echo "$HEALTH" | grep -q '"status"'; then
            echo "❌ Health response missing 'status' field"
            exit 1
          fi

          docker stop opsmate-api-test
          docker rm opsmate-api-test

      - name: Update cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
