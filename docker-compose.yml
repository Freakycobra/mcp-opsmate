# =============================================================================
# mcp-opsmate — Full Docker Compose Stack
# =============================================================================
# MOCK mode is default — zero external credentials needed.
# Set OPSMATE_MODE=live in .env to enable live integrations.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary data store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: opsmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opsmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opsmate}
      POSTGRES_DB: ${POSTGRES_DB:-opsmate}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - opsmate-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opsmate} -d ${POSTGRES_DB:-opsmate}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7 — Circuit breaker state & caching
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: opsmate-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - opsmate-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # API — FastAPI backend (production)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: opsmate/Dockerfile
    container_name: opsmate-api
    restart: unless-stopped
    environment:
      # Mode
      OPSMATE_MODE: ${OPSMATE_MODE:-mock}
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-opsmate}:${POSTGRES_PASSWORD:-opsmate}@postgres:5432/${POSTGRES_DB:-opsmate}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # API
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Integrations (optional — only used in LIVE mode)
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      GITHUB_PAT: ${GITHUB_PAT:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      # AWS (always mock / LocalStack)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - opsmate-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # API Dev — FastAPI backend with hot-reload
  # ---------------------------------------------------------------------------
  api-dev:
    build:
      context: .
      dockerfile: opsmate/Dockerfile
    container_name: opsmate-api-dev
    restart: unless-stopped
    environment:
      OPSMATE_MODE: ${OPSMATE_MODE:-mock}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-opsmate}:${POSTGRES_PASSWORD:-opsmate}@postgres:5432/${POSTGRES_DB:-opsmate}
      REDIS_URL: redis://redis:6379/0
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      GITHUB_PAT: ${GITHUB_PAT:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
    volumes:
      - ./opsmate:/app/opsmate:ro
      - ./opsmate/pyproject.toml:/app/pyproject.toml:ro
    command: uvicorn opsmate.api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/opsmate
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - opsmate-network
    profiles:
      - dev

  # ---------------------------------------------------------------------------
  # Web — Production React build (nginx)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./opsmate-web
      dockerfile: Dockerfile
    container_name: opsmate-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - opsmate-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Web Dev — Vite dev server with hot reload
  # ---------------------------------------------------------------------------
  web-dev:
    image: node:22-alpine
    container_name: opsmate-web-dev
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./opsmate-web:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
      VITE_WS_BASE_URL: ws://localhost:8080/ws
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    networks:
      - opsmate-network
    profiles:
      - dev

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: opsmate-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks:
      - opsmate-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics scraping (optional)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55
    container_name: opsmate-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - opsmate-network
    profiles:
      - monitoring
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

  # ---------------------------------------------------------------------------
  # LocalStack — AWS emulator (optional, for mock AWS)
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:3
    container_name: opsmate-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      SERVICES: ${LOCALSTACK_SERVICES:-s3,ec2,iam,cloudformation}
      DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      PERSISTENCE: "1"
      DATA_DIR: /var/lib/localstack/data
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - opsmate-network
    profiles:
      - aws
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

# =============================================================================
# Networks
# =============================================================================
networks:
  opsmate-network:
    driver: bridge
    name: opsmate-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  localstack-data:
    driver: local
