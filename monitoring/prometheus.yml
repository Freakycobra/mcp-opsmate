# =============================================================================
# mcp-opsmate — Prometheus Scrape Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: opsmate
    replica: '{{.ExternalURL}}'

# ------------------------------------------------------------------------------
# Alertmanager (placeholder — can be enabled later)
# ------------------------------------------------------------------------------
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ------------------------------------------------------------------------------
# Rule files (placeholder — can be enabled later)
# ------------------------------------------------------------------------------
# rule_files:
#   - /etc/prometheus/rules/*.yml

# ------------------------------------------------------------------------------
# Scrape configurations
# ------------------------------------------------------------------------------
scrape_configs:
  # ---- Prometheus self-monitoring --------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ---- mcp-opsmate API metrics -----------------------------------------------
  - job_name: 'opsmate-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    # Optional: basic auth if metrics endpoint is protected
    # basic_auth:
    #   username: admin
    #   password_file: /etc/prometheus/secrets/api_password

  # ---- PostgreSQL exporter (optional) ----------------------------------------
  # - job_name: 'postgres-exporter'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # ---- Redis exporter (optional) ---------------------------------------------
  # - job_name: 'redis-exporter'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
